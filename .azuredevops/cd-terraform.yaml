trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**/README.md'

pr: none

resources:
  repositories:
    - repository: templates
      type: github
      name: liam-goodchild/pipeline-engineering-templates
      endpoint: liam-goodchild
      ref: refs/heads/main

pool:
  vmImage: ubuntu-latest

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: Prod
  - name: additionalTfVars
    displayName: Additional Terraform Variables
    type: string
    default: ' '
  - name: enableVersioning
    displayName: Enable Git Versioning
    type: boolean
    default: true

variables:
  - group: certwatch-secrets
  - name: backendContainerName
    value: solution-certwatch-core
  - name: serviceConnectionName
    value: sh-sc-certwatch
  - name: globalTfvars
    value: infra/vars/globals.tfvars
  - name: tfvars
    value: infra/vars/uks/$(environmentCode).tfvars
  - ${{ if eq(parameters.environment, 'Prod') }}:
    - name: backendResourceGroupName
      value: sh-mgmt-prd-uks-tf-rg-01
    - name: backendStorageAccountName
      value: shmgmtprdukstfst01
    - name: environmentCode
      value: prd
  - ${{ else }}:
    - name: backendResourceGroupName
      value: sh-mgmt-dev-uks-tf-rg-01
    - name: backendStorageAccountName
      value: shmgmtdevukstfst01
    - name: environmentCode
      value: dev

stages:
  # Stage 1: Terraform Plan
  - stage: Plan
    displayName: 'Terraform Plan'
    jobs:
      - job: TerraformPlan
        displayName: 'Terraform Plan'
        steps:
          - checkout: self
          - template: terraform/terraform-cicd.yaml@templates
            parameters:
              terraformAction: plan
              serviceConnectionName: $(serviceConnectionName)
              backendResourceGroupName: $(backendResourceGroupName)
              backendStorageAccountName: $(backendStorageAccountName)
              backendContainerName: $(backendContainerName)
              backendKey: terraform.tfstate
              envTfvars: $(tfvars)
              globalTfvars: $(globalTfvars)
              additionalCommandOptions: -var="entra_client_secret=$(ENTRA_CLIENT_SECRET)" ${{ parameters.additionalTfVars }}
              publishPlan: true
              planArtifactName: 'tfplan-${{ parameters.environment }}'
              ensureBackendContainer: true

  # Stage 2: Terraform Apply
  - stage: Apply
    displayName: 'Terraform Apply'
    dependsOn: Plan
    condition: succeeded()
    jobs:
      - job: TerraformApply
        displayName: 'Terraform Apply'
        steps:
          - checkout: self
          - template: terraform/terraform-cicd.yaml@templates
            parameters:
              terraformAction: apply
              serviceConnectionName: $(serviceConnectionName)
              backendResourceGroupName: $(backendResourceGroupName)
              backendStorageAccountName: $(backendStorageAccountName)
              backendContainerName: $(backendContainerName)
              backendKey: terraform.tfstate
              envTfvars: $(tfvars)
              globalTfvars: $(globalTfvars)
              additionalCommandOptions: -var="entra_client_secret=$(ENTRA_CLIENT_SECRET)" ${{ parameters.additionalTfVars }}
              ensureBackendContainer: false

  # Stage 3: Git Versioning
  - stage: Versioning
    displayName: 'Git Versioning'
    dependsOn: Apply
    condition: and(succeeded(), eq('${{ parameters.enableVersioning }}', 'true'))
    jobs:
      - job: GitVersioning
        displayName: 'Create Git Tag'
        steps:
          - template: versioning/git-versioning.yaml@templates
            parameters:
              defaultAction: patch
              defaultBranch: main
