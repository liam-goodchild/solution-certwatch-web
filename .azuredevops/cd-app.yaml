trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: Prod
    values:
      - Dev
      - Prod

variables:
  ${{ if eq(parameters.environment, 'Prod') }}:
    environmentCode: prd
    functionAppName: sh-app-prd-uks-cw-func-01
    staticWebAppName: sh-app-prd-uks-cw-stapp-01
    resourceGroupName: sh-app-prd-uks-cw-rg-01
    serviceConnectionName: sh-sc-certwatch
  ${{ else }}:
    environmentCode: dev
    functionAppName: sh-app-dev-uks-cw-func-01
    staticWebAppName: sh-app-dev-uks-cw-stapp-01
    resourceGroupName: sh-app-dev-uks-cw-rg-01
    serviceConnectionName: sh-sc-certwatch

stages:
  # Stage 1: Build API
  - stage: BuildAPI
    displayName: 'Build API'
    jobs:
      - job: Build
        displayName: 'Compile TypeScript'
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: 'Use Node.js 20'
            inputs:
              versionSpec: '20.x'

          - script: npm ci
            displayName: 'Install dependencies'
            workingDirectory: src/api

          - script: npm run build
            displayName: 'Compile TypeScript'
            workingDirectory: src/api

          - task: ArchiveFiles@2
            displayName: 'Package API artifact'
            inputs:
              rootFolderOrFile: 'src/api'
              includeRootFolder: false
              archiveType: zip
              archiveFile: '$(Build.ArtifactStagingDirectory)/api.zip'
              replaceExistingArchive: true

          - task: PublishBuildArtifacts@1
            displayName: 'Publish API artifact'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/api.zip'
              ArtifactName: api

  # Stage 2: Deploy API
  - stage: DeployAPI
    displayName: 'Deploy API'
    dependsOn: BuildAPI
    condition: succeeded()
    jobs:
      - deployment: Deploy
        displayName: 'Deploy to Function App'
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: api

                - task: AzureFunctionApp@2
                  displayName: 'Deploy Function App'
                  inputs:
                    connectedServiceNameARM: $(serviceConnectionName)
                    appType: functionAppLinux
                    appName: $(functionAppName)
                    package: '$(Pipeline.Workspace)/api/api.zip'
                    deploymentMethod: zipDeploy

  # Stage 3: Build & Deploy Static Web App
  - stage: DeployWeb
    displayName: 'Build & Deploy Web'
    dependsOn: DeployAPI
    condition: succeeded()
    jobs:
      - job: BuildAndDeploy
        displayName: 'Build & Deploy Static Web App'
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: 'Use Node.js 20'
            inputs:
              versionSpec: '20.x'

          - script: npm ci
            displayName: 'Install dependencies'
            workingDirectory: src/web

          - script: npm run build
            displayName: 'Vite build'
            workingDirectory: src/web

          - task: AzureCLI@2
            displayName: 'Get SWA Deployment Token'
            inputs:
              azureSubscription: $(serviceConnectionName)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                TOKEN=$(az staticwebapp secrets list \
                  --name "$(staticWebAppName)" \
                  --resource-group "$(resourceGroupName)" \
                  --query "properties.apiKey" -o tsv)
                echo "##vso[task.setvariable variable=SWA_DEPLOYMENT_TOKEN;issecret=true]$TOKEN"

          - task: AzureStaticWebApp@0
            displayName: 'Deploy Static Web App'
            inputs:
              azure_static_web_apps_api_token: $(SWA_DEPLOYMENT_TOKEN)
              app_location: 'src/web'
              output_location: 'dist'
              skip_app_build: true
