trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: Prod
    values:
      - Dev
      - Prod

variables:
  ${{ if eq(parameters.environment, 'Prod') }}:
    environmentCode: prd
    functionAppName: sh-app-prd-uks-cw-func-01
    staticWebAppName: sh-app-prd-uks-cw-stapp-01
    resourceGroupName: sh-app-prd-uks-cw-rg-01
    serviceConnectionName: sh-sc-certwatch
  ${{ else }}:
    environmentCode: dev
    functionAppName: sh-app-dev-uks-cw-func-01
    staticWebAppName: sh-app-dev-uks-cw-stapp-01
    resourceGroupName: sh-app-dev-uks-cw-rg-01
    serviceConnectionName: sh-sc-certwatch

stages:
  # Stage 1: Build Timer Jobs (standalone Function App)
  - stage: BuildJobs
    displayName: 'Build Timer Jobs'
    jobs:
      - job: Build
        displayName: 'Compile TypeScript'
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: 'Use Node.js 20'
            inputs:
              versionSpec: '20.x'

          - script: npm ci
            displayName: 'Install dependencies'
            workingDirectory: src/jobs

          - script: npm run build
            displayName: 'Compile TypeScript'
            workingDirectory: src/jobs

          - task: ArchiveFiles@2
            displayName: 'Package Jobs artifact'
            inputs:
              rootFolderOrFile: 'src/jobs'
              includeRootFolder: false
              archiveType: zip
              archiveFile: '$(Build.ArtifactStagingDirectory)/jobs.zip'
              replaceExistingArchive: true

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Jobs artifact'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/jobs.zip'
              ArtifactName: jobs

  # Stage 2: Deploy Timer Jobs to Function App
  - stage: DeployJobs
    displayName: 'Deploy Timer Jobs'
    dependsOn: BuildJobs
    condition: succeeded()
    jobs:
      - deployment: Deploy
        displayName: 'Deploy to Function App'
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: jobs

                - task: AzureFunctionApp@2
                  displayName: 'Deploy Function App'
                  inputs:
                    connectedServiceNameARM: $(serviceConnectionName)
                    appType: functionAppLinux
                    appName: $(functionAppName)
                    package: '$(Pipeline.Workspace)/jobs/jobs.zip'
                    deploymentMethod: zipDeploy

  # Stage 3: Build & Deploy Static Web App (frontend + managed API)
  - stage: DeployWeb
    displayName: 'Build & Deploy Web + API'
    dependsOn: DeployJobs
    condition: succeeded()
    jobs:
      - job: BuildAndDeploy
        displayName: 'Build & Deploy Static Web App'
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: 'Use Node.js 20'
            inputs:
              versionSpec: '20.x'

          # Build frontend
          - script: npm ci
            displayName: 'Install web dependencies'
            workingDirectory: src/web

          - script: npm run build
            displayName: 'Vite build'
            workingDirectory: src/web

          # Build managed API
          - script: npm ci
            displayName: 'Install API dependencies'
            workingDirectory: src/api

          - script: npm run build
            displayName: 'Compile API TypeScript'
            workingDirectory: src/api

          - task: AzureCLI@2
            displayName: 'Get SWA Deployment Token'
            inputs:
              azureSubscription: $(serviceConnectionName)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                TOKEN=$(az staticwebapp secrets list \
                  --name "$(staticWebAppName)" \
                  --resource-group "$(resourceGroupName)" \
                  --query "properties.apiKey" -o tsv)
                echo "##vso[task.setvariable variable=SWA_DEPLOYMENT_TOKEN;issecret=true]$TOKEN"

          - task: AzureStaticWebApp@0
            displayName: 'Deploy Static Web App'
            inputs:
              azure_static_web_apps_api_token: $(SWA_DEPLOYMENT_TOKEN)
              app_location: 'src/web/dist'
              api_location: 'src/api'
              output_location: ''
              skip_app_build: true
              skip_api_build: true
            env:
              FUNCTIONS_WORKER_RUNTIME: node
              FUNCTIONS_EXTENSION_VERSION: ~4
