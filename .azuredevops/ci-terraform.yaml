trigger: none

pr:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**/README.md'

resources:
  repositories:
    - repository: templates
      type: github
      name: liam-goodchild/pipeline-engineering-templates
      endpoint: liam-goodchild
      ref: refs/heads/main

pool:
  vmImage: ubuntu-latest

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: Prod
  - name: additionalTfVars
    displayName: Additional Terraform Variables
    type: string
    default: ' '

variables:
  - group: certwatch-secrets
  - name: backendContainerName
    value: solution-certwatch-core
  - name: serviceConnectionName
    value: sh-sc-certwatch
  - name: globalTfvars
    value: infra/vars/globals.tfvars
  - name: tfvars
    value: infra/vars/uks/$(environmentCode).tfvars
  - ${{ if eq(parameters.environment, 'Prod') }}:
    - name: backendResourceGroupName
      value: sh-mgmt-prd-uks-tf-rg-01
    - name: backendStorageAccountName
      value: shmgmtprdukstfst01
    - name: environmentCode
      value: prd
  - ${{ else }}:
    - name: backendResourceGroupName
      value: sh-mgmt-dev-uks-tf-rg-01
    - name: backendStorageAccountName
      value: shmgmtdevukstfst01
    - name: environmentCode
      value: dev

stages:
  # Stage 1: Linting
  - stage: Linting
    displayName: 'Linting & Validation'
    condition: not(contains(variables['Build.SourceVersionMessage'], '[skip ci]'))
    jobs:
      - job: SuperLinter
        displayName: 'Super-Linter'
        steps:
          - template: validation/linting.yaml@templates
            parameters:
              prettierConfigFile: .prettierrc.json
              prettierIgnoreFile: .prettierignore
              checkovConfigFile: .checkov.yaml
              tflintConfigFile: .tflint.hcl

  # Stage 2: Documentation
  - stage: Documentation
    displayName: 'Terraform Documentation'
    dependsOn: Linting
    condition: succeeded()
    jobs:
      - job: TerraformDocs
        displayName: 'Generate Terraform Docs'
        steps:
          - template: documentation/tf-documentation.yaml@templates
            parameters:
              terraformDir: infra
              targetBranch: $(System.PullRequest.SourceBranch)

  # Stage 3: Terraform Plan
  - stage: Plan
    displayName: 'Terraform Plan'
    dependsOn: Documentation
    condition: succeeded()
    jobs:
      - job: TerraformPlan
        displayName: 'Terraform Plan'
        steps:
          - checkout: self
          - template: terraform/terraform-cicd.yaml@templates
            parameters:
              terraformAction: plan
              serviceConnectionName: $(serviceConnectionName)
              backendResourceGroupName: $(backendResourceGroupName)
              backendStorageAccountName: $(backendStorageAccountName)
              backendContainerName: $(backendContainerName)
              backendKey: terraform.tfstate
              envTfvars: $(tfvars)
              globalTfvars: $(globalTfvars)
              additionalCommandOptions: -var="entra_client_secret=$(ENTRA_CLIENT_SECRET)" ${{ parameters.additionalTfVars }}
              publishPlan: false
              ensureBackendContainer: true
